<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">spiralOrderPrint</span><span class="params">(<span class="keyword">int</span>[][] matrix)</span> </span>&#123;</span><br><span class="line">		<span class="keyword">int</span> tR = <span class="number">0</span>;</span><br><span class="line">		<span class="keyword">int</span> tC = <span class="number">0</span>;</span><br><span class="line">		<span class="keyword">int</span> dR = matrix.length - <span class="number">1</span>;</span><br><span class="line">		<span class="keyword">int</span> dC = matrix[<span class="number">0</span>].length - <span class="number">1</span>;</span><br><span class="line">		<span class="keyword">while</span> (tR &lt;= dR &amp;&amp; tC &lt;= dC) &#123;</span><br><span class="line">            <span class="comment">//打印完一个圈后，开始打印 里圈 </span></span><br><span class="line">			printEdge(matrix, tR++, tC++, dR--, dC--);</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="function"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">printEdge</span><span class="params">(<span class="keyword">int</span>[][] m, <span class="keyword">int</span> tR, <span class="keyword">int</span> tC, <span class="keyword">int</span> dR, <span class="keyword">int</span> dC)</span> </span>&#123;</span><br><span class="line">		<span class="keyword">if</span> (tR == dR) &#123;<span class="comment">//在同一行的情况下。挨个打印列 R的意思是行</span></span><br><span class="line">        </span><br><span class="line">			<span class="keyword">for</span> (<span class="keyword">int</span> i = tC; i &lt;= dC; i++) &#123;</span><br><span class="line">				System.out.print(m[tR][i] + <span class="string">" "</span>);</span><br><span class="line">			&#125;</span><br><span class="line">		&#125; <span class="keyword">else</span> <span class="keyword">if</span> (tC == dC) &#123;<span class="comment">//在同一列的情况下，挨个打印行 C的意思是列</span></span><br><span class="line">			<span class="keyword">for</span> (<span class="keyword">int</span> i = tR; i &lt;= dR; i++) &#123;</span><br><span class="line">				System.out.print(m[i][tC] + <span class="string">" "</span>);</span><br><span class="line">			&#125;</span><br><span class="line">		&#125; <span class="keyword">else</span> &#123;<span class="comment">//是一个小矩阵的时候：</span></span><br><span class="line">            <span class="comment">//保存第一个行和列</span></span><br><span class="line">			<span class="keyword">int</span> curC = tC;</span><br><span class="line">			<span class="keyword">int</span> curR = tR;</span><br><span class="line">			<span class="keyword">while</span> (curC != dC) &#123;<span class="comment">//打印第一个边，不包含下面的那个元素</span></span><br><span class="line">				System.out.print(m[tR][curC] + <span class="string">" "</span>);</span><br><span class="line">				curC++;</span><br><span class="line">			&#125;</span><br><span class="line">			<span class="keyword">while</span> (curR != dR) &#123;<span class="comment">//打印第二个边</span></span><br><span class="line">				System.out.print(m[curR][dC] + <span class="string">" "</span>);</span><br><span class="line">				curR++;</span><br><span class="line">			&#125;</span><br><span class="line">			<span class="keyword">while</span> (curC != tC) &#123;<span class="comment">//打印第三个边</span></span><br><span class="line">                </span><br><span class="line">				System.out.print(m[dR][curC] + <span class="string">" "</span>);</span><br><span class="line">				curC--;</span><br><span class="line">			&#125;</span><br><span class="line">			<span class="keyword">while</span> (curR != tR) &#123;<span class="comment">//打印最后一个边</span></span><br><span class="line">				System.out.print(m[curR][tC] + <span class="string">" "</span>);</span><br><span class="line">				curR--;</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="function"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">main</span><span class="params">(String[] args)</span> </span>&#123;</span><br><span class="line">		<span class="keyword">int</span>[][] matrix = &#123; &#123; <span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">4</span> &#125;, &#123; <span class="number">5</span>, <span class="number">6</span>, <span class="number">7</span>, <span class="number">8</span> &#125;, &#123; <span class="number">9</span>, <span class="number">10</span>, <span class="number">11</span>, <span class="number">12</span> &#125;,</span><br><span class="line">				&#123; <span class="number">13</span>, <span class="number">14</span>, <span class="number">15</span>, <span class="number">16</span> &#125; &#125;;</span><br><span class="line">		spiralOrderPrint(matrix);</span><br><span class="line">	&#125;</span><br></pre></td></tr></table></figure>
